spring:
  application:
    name: daily-app-kt
  datasource:
    url: jdbc:postgresql://localhost:5432/daily_app_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
